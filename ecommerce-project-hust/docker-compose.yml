version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ecommerce_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-toilamanhdevhust}
      MYSQL_DATABASE: ${DB_NAME:-ecommerce_db_hust}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-toilamanhdevhust}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    restart: unless-stopped
    env_file:
      - ./back-end/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=mysql
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-toilamanhdevhust}
      - DB_NAME=${DB_NAME:-ecommerce_db_hust}
      - JWT_SECRET=${JWT_SECRET:-HyperStepsSecretKey12345678901234567890123456789012345678901234567890}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-AIzaSyBBVEG-xUCXBmdB9EdRlqW55TexsqjJ1Lg}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL:-https://techstorehust.site}
      - VNPAY_URL=${VNPAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      - VNPAY_TMN_CODE=${VNPAY_TMN_CODE:-TMJ7UWMF}
      - VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET:-PCYPY7L159DSIEKYFRXWCAL6M503VYUH}
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL:-https://techstorehust.site/payment/callback}
    # ports:
      # - "5000:5000"  # Commented out - access via nginx reverse proxy
    volumes:
      - ./back-end:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://techstorehust.click/api}
    container_name: ecommerce_frontend
    restart: unless-stopped
    # ports:
      # - "3000:80"  # Commented out - access via nginx reverse proxy
    depends_on:
      - backend
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ecommerce_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ecommerce_network

  # Certbot for SSL certificates with auto-renewal
  certbot:
    image: certbot/certbot
    container_name: ecommerce_certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    networks:
      - ecommerce_network
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet && nginx -s reload || true; sleep 12h & wait $${!}; done;'"

volumes:
  mysql_data:
    driver: local
  certbot-www:
    driver: local
  certbot-conf:
    driver: local

networks:
  ecommerce_network:
    driver: bridge

